.overlay-title {

color: #c8b560;

z-index: 5;
white-space: nowrap;
}

</style>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = 800, H = 450;

// ── CONSTANTS ──────────────────────────────────────────
const GROUND_Y = 380;
const GRAVITY = 0.55;
const JUMP_V = -13;
const PLAYER_SPEED = 3.2;
const BULLET_SPEED = 10;
const ENEMY_BULLET_SPEED = 5;

// ── COLORS ─────────────────────────────────────────────
const C = {
  sky:    ['#0d1408','#121e08','#1a2a0e'],
  ground: '#2a3018',
  dirt:   '#1e2410',
  cover:  '#3a4828',
  coverDark: '#2a3618',
  player: '#4a7830',
  playerDark: '#2e4e1e',
  enemy:  '#7a3020',
  enemyDark: '#4e1e10',
  bullet: '#ffee70',
  eBullet:'#ff6040',
  muzzle: '#ffe090',
  blood:  '#8a2010',
  expl:   ['#ffcc20','#ff8820','#ff4420','#cc2010'],
  ui:     '#c8b560',
  green:  '#4a8a20',
  moon:   '#d0c880',
};

// ── GAME STATE ─────────────────────────────────────────
let state = 'menu'; // menu | playing | gameover | winclear
let score = 0;
let kills = 0;
let wave = 1;
let waveTimer = 0;
let waveAnnounce = false;
let waveAnnTimer = 0;

// ── INPUT ──────────────────────────────────────────────
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'ArrowDown') e.preventDefault();
  if (state === 'playing') {
    if (e.code === 'Space') shootPlayer();
    if (e.code === 'ShiftLeft' || e.code === 'ShiftRight') throwGrenade();
  }
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// ── PARTICLES ──────────────────────────────────────────
let particles = [];
function spawnParticles(x, y, color, count=8, speed=3, life=30) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = Math.random() * speed + 1;
    particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s - 1, life, maxLife: life, color });
  }
}
function spawnExplosion(x, y, big=false) {
  const n = big ? 30 : 16;
  const sp = big ? 6 : 4;
  C.expl.forEach(c => spawnParticles(x, y, c, n/4, sp, big?45:30));
  spawnParticles(x, y, '#ffffff', 4, sp*1.5, 15);
}

// ── BULLETS ────────────────────────────────────────────
let bullets = [];
let eBullets = [];
let grenades = [];
let grenadeCount = 3;

function shootPlayer() {
  const p = player;
  const bx = p.facing === 1 ? p.x + p.w : p.x;
  bullets.push({ x: bx, y: p.y + (p.crouching ? 14 : 10), vx: BULLET_SPEED * p.facing, life: 80 });
  spawnParticles(bx, p.y + 10, C.muzzle, 4, 4, 12);
}

function shootEnemy(e) {
  const dir = e.x > player.x ? -1 : 1;
  eBullets.push({ x: e.x + (dir === 1 ? e.w : 0), y: e.y + 12, vx: ENEMY_BULLET_SPEED * dir, life: 120 });
  spawnParticles(e.x + e.w/2, e.y + 12, C.muzzle, 3, 3, 10);
  e.shootCooldown = e.shootRate;
}

function throwGrenade() {
  if (grenadeCount <= 0) return;
  grenadeCount--;
  updateHUD();
  const dir = player.facing;
  grenades.push({
    x: player.x + player.w/2, y: player.y,
    vx: dir * 7, vy: -10,
    life: 120, exploded: false
  });
}

// ── COVER OBJECTS ──────────────────────────────────────
const covers = [
  { x: 120, y: GROUND_Y - 30, w: 60, h: 30 },
  { x: 280, y: GROUND_Y - 30, w: 50, h: 30 },
  { x: 460, y: GROUND_Y - 45, w: 70, h: 45 },
  { x: 620, y: GROUND_Y - 30, w: 55, h: 30 },
];

// ── PLAYER ─────────────────────────────────────────────
let player = {};
function resetPlayer() {
  player = {
    x: 60, y: GROUND_Y - 42, w: 22, h: 42,
    vx: 0, vy: 0,
    onGround: false,
    facing: 1,
    crouching: false,
    hp: 100, maxHp: 100,
    shootCooldown: 0,
    invincible: 0,
    animFrame: 0, animTimer: 0
  };
}

// ── ENEMIES ────────────────────────────────────────────
let enemies = [];

function spawnEnemy(x, hp, speed, shootRate) {
  enemies.push({
    x, y: GROUND_Y - 38, w: 20, h: 38,
    vx: 0, vy: 0,
    onGround: false,
    facing: -1,
    hp, maxHp: hp,
    speed, shootRate,
    shootCooldown: Math.random() * shootRate,
    state: 'approach', // approach | cover | shoot
    coverTimer: 0,
    alertTimer: 0,
    animFrame: 0, animTimer: 0,
    crouching: false,
    dead: false,
    deathTimer: 0
  });
}

function spawnWave(w) {
  enemies = [];
  const count = 2 + w * 2;
  const hp = 30 + w * 10;
  const spd = 1 + w * 0.2;
  const shootRate = Math.max(40 - w * 3, 18);
  for (let i = 0; i < count; i++) {
    const x = 700 + i * 90;
    spawnEnemy(x, hp, spd, shootRate);
  }
}

// ── PHYSICS HELPERS ────────────────────────────────────
function applyGravity(obj) {
  obj.vy += GRAVITY;
  obj.y += obj.vy;
  obj.x += obj.vx;

  // Ground
  if (obj.y + obj.h >= GROUND_Y) {
    obj.y = GROUND_Y - obj.h;
    obj.vy = 0;
    obj.onGround = true;
  } else {
    obj.onGround = false;
  }

  // Cover collision
  covers.forEach(c => {
    if (obj.x + obj.w > c.x && obj.x < c.x + c.w &&
        obj.y + obj.h > c.y && obj.y + obj.h < c.y + c.h + 15 && obj.vy >= 0) {
      obj.y = c.y - obj.h;
      obj.vy = 0;
      obj.onGround = true;
    }
  });

  // Clamp x
  if (obj.x < 0) obj.x = 0;
  if (obj.x + obj.w > W) obj.x = W - obj.w;
}

// ── COLLISION ──────────────────────────────────────────
function rectOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x &&
         a.y < b.y + b.h && a.y + a.h > b.y;
}

// ── AI UPDATE ──────────────────────────────────────────
function updateEnemy(e) {
  if (e.dead) {
    e.deathTimer++;
    return;
  }

  const dx = player.x - e.x;
  const dist = Math.abs(dx);
  e.facing = dx < 0 ? -1 : 1;

  // Decide state
  if (dist > 350) {
    e.state = 'approach';
  } else if (dist < 180 && e.shootCooldown <= 0) {
    e.state = 'shoot';
  } else if (dist < 350 && Math.random() < 0.003) {
    e.state = 'cover';
    e.coverTimer = 60 + Math.random() * 80;
  }

  if (e.state === 'cover') {
    e.coverTimer--;
    e.crouching = true;
    if (e.coverTimer <= 0) { e.state = 'approach'; e.crouching = false; }
  } else {
    e.crouching = false;
  }

  // Move
  if (e.state === 'approach') {
    const targetDist = 150 + (Math.random() < 0.3 ? 80 : 0);
    if (dist > targetDist) {
      e.vx = e.speed * Math.sign(dx);
    } else {
      e.vx = 0;
    }
  } else if (e.state === 'shoot') {
    e.vx = 0;
  } else {
    e.vx *= 0.8;
  }

  // Shoot
  e.shootCooldown--;
  if (e.shootCooldown <= 0 && dist < 400 && !e.crouching) {
    // Line of sight check (simplified: not blocked by cover)
    let los = true;
    covers.forEach(c => {
      if (Math.min(e.x, player.x) < c.x + c.w &&
          Math.max(e.x, player.x) > c.x &&
          player.y + player.h > c.y) {
        los = false;
      }
    });
    if (los || Math.random() < 0.3) shootEnemy(e);
  }

  // Jump over cover
  covers.forEach(c => {
    if (Math.abs((e.x + e.w/2) - (c.x + c.w/2)) < 60 && e.onGround && e.state === 'approach') {
      e.vy = JUMP_V * 0.85;
    }
  });

  applyGravity(e);

  // Animate
  e.animTimer++;
  if (e.animTimer > 8) { e.animTimer = 0; e.animFrame = (e.animFrame + 1) % 4; }
}

// ── PLAYER UPDATE ──────────────────────────────────────
function updatePlayer() {
  const moveLeft  = keys['ArrowLeft']  || keys['KeyA'];
  const moveRight = keys['ArrowRight'] || keys['KeyD'];
  const jump      = keys['ArrowUp']    || keys['KeyW'];
  const crouch    = keys['ArrowDown']  || keys['KeyS'];

  player.crouching = crouch && player.onGround;

  if (!player.crouching) {
    if (moveLeft)  { player.vx = -PLAYER_SPEED; player.facing = -1; }
    else if (moveRight) { player.vx = PLAYER_SPEED; player.facing = 1; }
    else player.vx = 0;
  } else {
    player.vx = 0;
  }

  if (jump && player.onGround) player.vy = JUMP_V;

  if (player.invincible > 0) player.invincible--;

  applyGravity(player);

  // Animate
  if (player.vx !== 0) {
    player.animTimer++;
    if (player.animTimer > 8) { player.animTimer = 0; player.animFrame = (player.animFrame + 1) % 4; }
  } else { player.animFrame = 0; }
}

// ── UPDATE BULLETS ─────────────────────────────────────
function updateBullets() {
  // Player bullets
  bullets = bullets.filter(b => {
    b.x += b.vx;
    b.life--;
    if (b.life <= 0 || b.x < 0 || b.x > W) return false;
    // Hit enemy
    for (let e of enemies) {
      if (!e.dead && b.x > e.x && b.x < e.x + e.w && b.y > e.y && b.y < e.y + e.h) {
        e.hp -= 20;
        spawnParticles(b.x, b.y, C.blood, 6, 3, 20);
        if (e.hp <= 0) {
          e.dead = true;
          kills++;
          score += 100 * wave;
          spawnExplosion(e.x + e.w/2, e.y + e.h/2);
          updateHUD();
        }
        return false;
      }
    }
    return true;
  });

  // Enemy bullets
  eBullets = eBullets.filter(b => {
    b.x += b.vx;
    b.life--;
    if (b.life <= 0 || b.x < 0 || b.x > W) return false;
    // Hit player
    if (player.invincible <= 0 &&
        b.x > player.x && b.x < player.x + player.w &&
        b.y > player.y && b.y < player.y + player.h) {
      hitPlayer(15);
      return false;
    }
    return true;
  });

  // Grenades
  grenades = grenades.filter(g => {
    if (g.exploded) return false;
    g.vy += GRAVITY;
    g.x += g.vx;
    g.y += g.vy;
    g.life--;

    if (g.y + 8 >= GROUND_Y) {
      g.y = GROUND_Y - 8;
      g.vy *= -0.4;
      g.vx *= 0.7;
    }
    if (g.life <= 0) {
      // Explode
      spawnExplosion(g.x, g.y, true);
      enemies.forEach(e => {
        if (!e.dead && Math.hypot(e.x - g.x, e.y - g.y) < 80) {
          e.hp -= 60;
          if (e.hp <= 0) {
            e.dead = true; kills++; score += 150 * wave;
            updateHUD();
          }
        }
      });
      if (Math.hypot(player.x - g.x, player.y - g.y) < 80) hitPlayer(20);
      g.exploded = true;
      return false;
    }
    return true;
  });
}

function hitPlayer(dmg) {
  player.hp -= dmg;
  player.invincible = 40;
  spawnParticles(player.x + player.w/2, player.y + player.h/2, C.blood, 6, 3, 20);
  updateHUD();
  if (player.hp <= 0) {
    player.hp = 0;
    spawnExplosion(player.x + player.w/2, player.y + player.h/2, true);
    endGame(false);
  }
}

// ── HUD ────────────────────────────────────────────────
function updateHUD() {
  const pct = player.hp / player.maxHp;
  const bar = document.getElementById('health-bar');
  bar.style.width = (pct * 100) + '%';
  bar.className = pct < 0.35 ? 'danger' : '';
  document.getElementById('hud-score').textContent = String(score).padStart(5,'0');
  document.getElementById('hud-wave').textContent = wave;
  document.getElementById('hud-kills').textContent = kills;
  document.getElementById('hud-gren').textContent = grenadeCount;
}

// ── WAVE MANAGEMENT ────────────────────────────────────
function checkWave() {
  const alive = enemies.filter(e => !e.dead || e.deathTimer < 30);
  if (alive.length === 0 && enemies.length > 0 && !waveAnnounce) {
    if (wave >= 5) { endGame(true); return; }
    wave++;
    grenadeCount = Math.min(grenadeCount + 2, 5);
    waveAnnounce = true;
    waveAnnTimer = 120;
    const ann = document.getElementById('wave-announce');
    ann.textContent = `WAVE ${wave}`;
    ann.classList.add('show');
    updateHUD();
    setTimeout(() => {
      spawnWave(wave);
      setTimeout(() => ann.classList.remove('show'), 800);
    }, 1800);
  }
  if (waveAnnounce) {
    waveAnnTimer--;
    if (waveAnnTimer <= 0) waveAnnounce = false;
  }
}

// ── GAME START / END ───────────────────────────────────
function startGame() {
  score = 0; kills = 0; wave = 1; grenadeCount = 3;
  bullets = []; eBullets = []; grenades = []; particles = [];
  resetPlayer();
  spawnWave(1);
  updateHUD();
  state = 'playing';
  document.getElementById('overlay').classList.add('hidden');
  const ann = document.getElementById('wave-announce');
  ann.textContent = 'WAVE 1 — BEGIN!';
  ann.classList.add('show');
  setTimeout(() => ann.classList.remove('show'), 1500);
  loop();
}

function endGame(win) {
  state = win ? 'winclear' : 'gameover';
  const ov = document.getElementById('overlay');
  ov.innerHTML = `
    <div class="overlay-title" style="color:${win ? '#c8b560' : '#c84040'}">${win ? 'VICTORY' : 'KIA'}</div>
    <div class="overlay-sub">${win ? 'THE LINE HOLDS. ENEMY ROUTED.' : 'SOLDIER DOWN. THE LINE IS BROKEN.'}</div>
    <div class="overlay-score">SCORE: ${String(score).padStart(5,'0')} &nbsp;|&nbsp; KILLS: ${kills} &nbsp;|&nbsp; WAVE: ${wave}</div>
    <button class="start-btn" onclick="startGame()">REDEPLOY</button>
  `;
  ov.classList.remove('hidden');
}

// ── DRAW FUNCTIONS ─────────────────────────────────────
function drawBackground() {
  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  grad.addColorStop(0, '#080e04');
  grad.addColorStop(0.6, '#0d1608');
  grad.addColorStop(1, '#1a2a10');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, GROUND_Y);

  // Moon
  ctx.fillStyle = C.moon;
  ctx.shadowColor = C.moon;
  ctx.shadowBlur = 30;
  ctx.beginPath();
  ctx.arc(680, 55, 22, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Stars
  ctx.fillStyle = 'rgba(200,220,160,0.7)';
  [[30,25],[90,15],[155,40],[230,18],[340,35],[420,12],[520,28],[600,40],[750,20],[760,55]].forEach(([sx,sy]) => {
    ctx.fillRect(sx, sy, 1.5, 1.5);
  });

  // Distant hills
  ctx.fillStyle = '#0e1a08';
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y-10);
  ctx.bezierCurveTo(100, GROUND_Y-70, 200, GROUND_Y-40, 350, GROUND_Y-80);
  ctx.bezierCurveTo(500, GROUND_Y-110, 620, GROUND_Y-60, 800, GROUND_Y-30);
  ctx.lineTo(800, GROUND_Y);
  ctx.lineTo(0, GROUND_Y);
  ctx.fill();

  // Trees silhouette
  [[50, GROUND_Y-95],[75, GROUND_Y-110],[730, GROUND_Y-100],[755, GROUND_Y-120],[775, GROUND_Y-90]].forEach(([tx,ty]) => {
    ctx.fillStyle = '#0a1206';
    ctx.fillRect(tx-3, ty+20, 6, 30);
    ctx.beginPath();
    ctx.moveTo(tx, ty);
    ctx.lineTo(tx+18, ty+30);
    ctx.lineTo(tx-18, ty+30);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(tx, ty-15);
    ctx.lineTo(tx+13, ty+15);
    ctx.lineTo(tx-13, ty+15);
    ctx.closePath();
    ctx.fill();
  });
}

function drawGround() {
  // Ground base
  ctx.fillStyle = C.ground;
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
  // Dirt texture lines
  ctx.fillStyle = C.dirt;
  ctx.fillRect(0, GROUND_Y, W, 4);
  for (let i = 0; i < 12; i++) {
    ctx.fillRect(i*70 + Math.sin(i)*10, GROUND_Y+6, 40, 2);
  }
}

function drawCover(c) {
  // Sandbag style
  ctx.fillStyle = C.coverDark;
  ctx.fillRect(c.x+2, c.y+4, c.w, c.h);
  ctx.fillStyle = C.cover;
  ctx.fillRect(c.x, c.y, c.w, c.h);
  // Bag sections
  ctx.fillStyle = C.coverDark;
  const bags = Math.floor(c.w / 20);
  for (let i = 0; i < bags; i++) {
    ctx.fillRect(c.x + i*20 + 2, c.y + 2, 16, c.h - 4);
  }
  // Highlight
  ctx.fillStyle = 'rgba(200,210,160,0.08)';
  ctx.fillRect(c.x+2, c.y+2, c.w-4, 4);
}

function drawSoldier(x, y, w, h, col, colDark, facing, frame, crouching, invincible, hp, maxHp) {
  const ah = crouching ? h * 0.65 : h;
  const ay = y + (h - ah);
  const cx = x + w/2;

  if (invincible > 0 && Math.floor(invincible/4) % 2 === 0) return;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(cx, GROUND_Y, w*0.6, 4, 0, 0, Math.PI*2);
  ctx.fill();

  // Boots
  ctx.fillStyle = '#1a1a10';
  if (!crouching) {
    const legOff = [0,1,0,-1][frame]*2;
    ctx.fillRect(x+2, ay+ah-8, w/2-2, 8);
    ctx.fillRect(x+w/2, ay+ah-8+legOff, w/2-2, 8);
  } else {
    ctx.fillRect(x+2, ay+ah-6, w-4, 6);
  }

  // Pants
  ctx.fillStyle = colDark;
  ctx.fillRect(x+3, ay+ah-18, w-6, 12);

  // Body
  ctx.fillStyle = col;
  ctx.fillRect(x+2, ay+(crouching?4:8), w-4, ah-18);

  // Arm / gun
  ctx.fillStyle = colDark;
  const armY = ay + (crouching ? 10 : 16);
  if (facing === 1) {
    ctx.fillRect(x+w-2, armY, 10, 5);
    ctx.fillStyle = '#333';
    ctx.fillRect(x+w+6, armY+1, 8, 3);
  } else {
    ctx.fillRect(x-8, armY, 10, 5);
    ctx.fillStyle = '#333';
    ctx.fillRect(x-14, armY+1, 8, 3);
  }

  // Head
  ctx.fillStyle = col;
  ctx.fillRect(x+4, ay+2, w-8, 14);
  // Helmet
  ctx.fillStyle = colDark;
  ctx.beginPath();
  ctx.ellipse(cx, ay+5, w/2-1, 7, 0, Math.PI, 0);
  ctx.fill();
  ctx.fillRect(x+1, ay+5, w-2, 4);
  // Eyes
  ctx.fillStyle = '#ffeeaa';
  const eyeX = facing === 1 ? x+w-8 : x+4;
  ctx.fillRect(eyeX, ay+8, 3, 2);
}

function drawBullet(b) {
  ctx.fillStyle = C.bullet;
  ctx.shadowColor = C.bullet;
  ctx.shadowBlur = 6;
  ctx.fillRect(b.x-4, b.y-2, 8, 3);
  ctx.shadowBlur = 0;
}

function drawEBullet(b) {
  ctx.fillStyle = C.eBullet;
  ctx.shadowColor = C.eBullet;
  ctx.shadowBlur = 6;
  ctx.fillRect(b.x-4, b.y-2, 8, 3);
  ctx.shadowBlur = 0;
}

function drawGrenade(g) {
  ctx.fillStyle = '#5a8a30';
  ctx.shadowColor = '#90ff40';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.arc(g.x, g.y, 5, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;
}

function drawParticles() {
  particles.forEach(p => {
    const a = p.life / p.maxLife;
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x-2, p.y-2, 4, 4);
  });
  ctx.globalAlpha = 1;
}

function drawHealthBar(x, y, w, hp, maxHp, isPlayer) {
  const pct = hp / maxHp;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(x-1, y-1, w+2, 6);
  ctx.fillStyle = isPlayer ? '#4a8a20' : '#8a2020';
  ctx.fillRect(x, y, w * pct, 4);
}

// ── MAIN LOOP ──────────────────────────────────────────
let raf;
function loop() {
  if (state !== 'playing') return;
  update();
  draw();
  raf = requestAnimationFrame(loop);
}

function update() {
  updatePlayer();
  enemies.forEach(e => updateEnemy(e));
  enemies = enemies.filter(e => !e.dead || e.deathTimer < 60);
  updateBullets();

  // Update particles
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1;
    p.life--;
  });
  particles = particles.filter(p => p.life > 0);

  // Check enemy-player collision
  enemies.forEach(e => {
    if (!e.dead && player.invincible <= 0 && rectOverlap(player, e)) {
      hitPlayer(8);
    }
  });

  checkWave();
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();
  drawGround();
  covers.forEach(drawCover);

  // Bullets
  bullets.forEach(drawBullet);
  eBullets.forEach(drawEBullet);
  grenades.forEach(drawGrenade);

  // Enemies
  enemies.forEach(e => {
    if (!e.dead) {
      drawSoldier(e.x, e.y, e.w, e.h, C.enemy, C.enemyDark, e.facing, e.animFrame, e.crouching, 0, e.hp, e.maxHp);
      drawHealthBar(e.x, e.y - 8, e.w, e.hp, e.maxHp, false);
    }
  });

  // Player
  drawSoldier(player.x, player.y, player.w, player.h, C.player, C.playerDark, player.facing, player.animFrame, player.crouching, player.invincible, player.hp, player.maxHp);

  // Particles (on top)
  drawParticles();

  // Atmospheric vignette
  const vign = ctx.createRadialGradient(W/2, H/2, H*0.3, W/2, H/2, H);
  vign.addColorStop(0, 'rgba(0,0,0,0)');
  vign.addColorStop(1, 'rgba(0,0,0,0.55)');
  ctx.fillStyle = vign;
  ctx.fillRect(0, 0, W, H);
}

// ── START BUTTON ───────────────────────────────────────
document.getElementById('start-btn').addEventListener('click', startGame);
document.addEventListener('keydown', e => {
  if ((e.code === 'Enter' || e.code === 'Space') && state === 'menu') {
    startGame();
  }
});
</script>
